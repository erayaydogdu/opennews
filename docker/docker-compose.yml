# ═══════════════════════════════════════════════════════════
#  OpenNews — Docker Compose (全服务编排)
#
#  启动: docker compose -f docker/docker-compose.yml up -d
#  停止: docker compose -f docker/docker-compose.yml down
#  日志: docker compose -f docker/docker-compose.yml logs -f
# ═══════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (主存储) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opennews-postgres
    restart: unless-stopped
    ports:
      - "${PG_PORT:-5432}:5432"
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-123456}
      POSTGRES_DB: ${PG_DATABASE:-opennews}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-opennews}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Neo4j (知识图谱) ────────────────────────────────────
  neo4j:
    image: neo4j:5-community
    container_name: opennews-neo4j
    restart: unless-stopped
    ports:
      - "${NEO4J_HTTP_PORT:-7474}:7474"
      - "${NEO4J_BOLT_PORT:-7687}:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-Aa123456}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
      NEO4J_server_default__listen__address: 0.0.0.0
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-Aa123456} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis (时序记忆) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opennews-redis
    restart: unless-stopped
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: >
      redis-server
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
      --protected-mode yes
      --rename-command FLUSHALL ""
      --rename-command FLUSHDB ""
      --rename-command DEBUG ""
    volumes:
      - ./redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ── OpenNews 后端 (流水线) ──────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: opennews-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-123456}
      PG_DATABASE: ${PG_DATABASE:-opennews}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-Aa123456}
      REDIS_URL: redis://redis:6379/0
      NEWS_POLL_INTERVAL_MIN: ${NEWS_POLL_INTERVAL_MIN:-5}
      BATCH_SIZE: ${BATCH_SIZE:-32}
      REPORT_ENABLED: ${REPORT_ENABLED:-true}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-gpt-4o-mini}
      SOURCES_CONFIG_PATH: /app/config/sources.yaml
      LLM_CONFIG_PATH: /app/config/llm.yaml
      CHECKPOINT_FILE: /app/seeds/checkpoint.json
    volumes:
      - ../seeds:/app/seeds
      - ../config:/app/config
    deploy:
      resources:
        limits:
          memory: 4G

  # ── OpenNews 前端 (Web 面板) ────────────────────────────
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: opennews-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:8080"
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-123456}
      PG_DATABASE: ${PG_DATABASE:-opennews}
    command: ["python", "web/server.py", "--port", "8080"]
    deploy:
      resources:
        limits:
          memory: 256M
