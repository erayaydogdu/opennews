# ═══════════════════════════════════════════════════════════
#  OpenNews — Docker Compose (full service orchestration)
#
#  Start: docker compose -f docker/docker-compose.yml up -d
#  Stop:  docker compose -f docker/docker-compose.yml down
#  Logs:  docker compose -f docker/docker-compose.yml logs -f
# ═══════════════════════════════════════════════════════════

services:

  # ── PostgreSQL (primary storage) ──────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: opennews-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PG_USER:-postgres}
      POSTGRES_PASSWORD: ${PG_PASSWORD:-123456}
      POSTGRES_DB: ${PG_DATABASE:-opennews}
    volumes:
      - ./postgres:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PG_USER:-postgres} -d ${PG_DATABASE:-opennews}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          memory: 512M

  # ── Neo4j (knowledge graph) ────────────────────────────────────
  neo4j:
    image: neo4j:latest
    container_name: opennews-neo4j
    restart: unless-stopped
    environment:
      NEO4J_AUTH: ${NEO4J_USER:-neo4j}/${NEO4J_PASSWORD:-Aa123456}
      NEO4J_server_memory_heap_initial__size: 256m
      NEO4J_server_memory_heap_max__size: 512m
      NEO4J_server_memory_pagecache_size: 256m
    volumes:
      - ./neo4j/data:/data
      - ./neo4j/logs:/logs
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u ${NEO4J_USER:-neo4j} -p ${NEO4J_PASSWORD:-Aa123456} 'RETURN 1' || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 30s
    deploy:
      resources:
        limits:
          memory: 1G

  # ── Redis (time-series memory) ────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: opennews-redis
    restart: unless-stopped
    command:
      - redis-server
      - --maxmemory
      - 256mb
      - --maxmemory-policy
      - allkeys-lru
      - --protected-mode
      - "yes"
    volumes:
      - ./redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    deploy:
      resources:
        limits:
          memory: 300M

  # ── OpenNews backend (pipeline) ──────────────────────────────
  backend:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: opennews-backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-123456}
      PG_DATABASE: ${PG_DATABASE:-opennews}
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-Aa123456}
      REDIS_URL: redis://redis:6379/0
      NEWS_POLL_INTERVAL_MIN: ${NEWS_POLL_INTERVAL_MIN:-5}
      BATCH_SIZE: ${BATCH_SIZE:-32}
      REPORT_ENABLED: ${REPORT_ENABLED:-true}
      LLM_API_KEY: ${LLM_API_KEY:-}
      LLM_BASE_URL: ${LLM_BASE_URL:-}
      LLM_MODEL: ${LLM_MODEL:-}
      SOURCES_CONFIG_PATH: /app/config/sources.yaml
      LLM_CONFIG_PATH: /app/config/llm.yaml
      CHECKPOINT_FILE: /app/seeds/checkpoint.json
      HF_HUB_OFFLINE: "1"
      TRANSFORMERS_OFFLINE: "1"
      # Proxy config: containers access external LLM API via host gateway
      HTTP_PROXY: ${CONTAINER_HTTP_PROXY:-}
      HTTPS_PROXY: ${CONTAINER_HTTPS_PROXY:-}
      NO_PROXY: postgres,neo4j,redis,localhost,127.0.0.1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ../seeds:/app/seeds
      - ../config:/app/config
      - ${HF_HOME:-~/.cache/huggingface}:/root/.cache/huggingface:ro
    deploy:
      resources:
        limits:
          memory: 4G

  # ── OpenNews frontend (web dashboard) ────────────────────────────
  web:
    build:
      context: ..
      dockerfile: Dockerfile
    container_name: opennews-web
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8090}:8080"
    environment:
      PG_HOST: postgres
      PG_PORT: "5432"
      PG_USER: ${PG_USER:-postgres}
      PG_PASSWORD: ${PG_PASSWORD:-123456}
      PG_DATABASE: ${PG_DATABASE:-opennews}
    command: ["python", "web/server.py", "--port", "8080"]
    deploy:
      resources:
        limits:
          memory: 256M
