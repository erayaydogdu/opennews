# ═══════════════════════════════════════════════════════════
#  OpenNews — LLM Configuration
#  Used for topic refinement and other scenarios requiring LLM inference
# ═══════════════════════════════════════════════════════════

# Base connection config (overridable via env vars: LLM_API_KEY, LLM_BASE_URL, LLM_MODEL)
provider: openai              # openai | openai_compatible
base_url: https://cliproxy-jp.toapis.org/v1                # Custom endpoint (ollama / vllm / one-api, etc.); null uses official OpenAI
api_key: sk-2gJH1kqxMoXbSDqz419aC60eF95a4f8f80465dAfBf39D1C9                 # Fill in here or set via LLM_API_KEY env var
model: gpt-5.2            # Recommended: gpt-4o-mini (cost-effective); can also use deepseek-chat, etc.
temperature: 0.1              # Low temperature ensures classification stability
max_tokens: 4096
timeout: 60                   # Single request timeout (seconds)

# Feature toggles
topic_refine_enabled: true    # Enable LLM topic refinement; false falls back to pure clustering

# Topic refinement prompt configuration
topic_refine:
  # System prompt
  system_prompt: |
    You are a news topic clustering analyst.
    You excel at identifying which news headlines report on the same event or topic, and which are only superficially similar but actually unrelated.
    The criteria are the core event, subject, and causal relationship discussed in the news, not shared broad keywords or domain.

  # User prompt template ({news_list} will be replaced with the news list)
  user_prompt_template: |
    The following news items were preliminarily grouped as the same topic. Please re-examine and regroup:

    {news_list}

    Group news that truly discusses the same event/topic together, and split out unrelated ones.

    Output strict JSON:
    ```json
    {{
      "groups": [
        {{
          "label_zh": "Summarized Chinese topic label, 10-20 chars",
          "label_en": "Concise English topic label, 5-10 words",
          "indices": [0, 2]
        }}
      ]
    }}
    ```

    Requirements:
    1. indices are news sequence numbers (starting from 0); each news item can only appear once
    2. News unrelated to the rest of the group should be in its own group
    3. label_zh should accurately summarize the group's common topic (Chinese); label_en is the corresponding English topic label
    4. Output only JSON
