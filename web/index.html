<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenNews — 金融新闻影响评估</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Geist+Mono:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="layout" id="layout">
  <div class="shell">
    <!-- header -->
    <header class="hdr">
      <div class="hdr-left">
        <span class="hdr-logo">◆</span>
        <span class="hdr-title">OPENNEWS</span>
        <span class="hdr-sub">IMPACT TERMINAL</span>
      </div>
      <div class="hdr-right">
        <button class="theme-toggle" id="themeToggle" title="切换日间/夜间模式">
          <svg class="theme-icon theme-icon--sun" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          <svg class="theme-icon theme-icon--moon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
        </button>
        <span class="hdr-divider">│</span>
        <span class="hdr-stat" id="statTotal">—</span>
        <span class="hdr-stat-label">条新闻</span>
        <span class="hdr-divider">│</span>
        <span class="hdr-stat" id="statTopics">—</span>
        <span class="hdr-stat-label">个主题</span>
        <span class="hdr-divider">│</span>
        <span class="hdr-badge hdr-badge--high" id="statHigh">—</span>
        <span class="hdr-badge hdr-badge--mid" id="statMid">—</span>
        <span class="hdr-badge hdr-badge--low" id="statLow">—</span>
      </div>
    </header>

    <!-- chart + range -->
    <section class="chart-section">
      <div class="chart-header">
        <span class="chart-label">SCORE DISTRIBUTION</span>
        <span class="chart-range-text" id="rangeText">50.0 — 100.0</span>
      </div>
      <canvas id="distChart" width="960" height="140"></canvas>
      <div class="range-wrap">
        <div class="range-track" id="rangeTrack">
          <div class="range-fill" id="rangeFill"></div>
          <div class="range-dot" style="left:0%" data-val="0"></div>
          <div class="range-dot" style="left:10%" data-val="10"></div>
          <div class="range-dot" style="left:20%" data-val="20"></div>
          <div class="range-dot" style="left:30%" data-val="30"></div>
          <div class="range-dot" style="left:40%" data-val="40"></div>
          <div class="range-dot" style="left:50%" data-val="50"></div>
          <div class="range-dot" style="left:60%" data-val="60"></div>
          <div class="range-dot" style="left:70%" data-val="70"></div>
          <div class="range-dot" style="left:80%" data-val="80"></div>
          <div class="range-dot" style="left:90%" data-val="90"></div>
          <div class="range-dot" style="left:100%" data-val="100"></div>
          <div class="range-thumb range-thumb--lo" id="thumbLo" tabindex="0"></div>
          <div class="range-thumb range-thumb--hi" id="thumbHi" tabindex="0"></div>
        </div>
        <div class="range-labels">
          <span>0</span><span>10</span><span>20</span><span>30</span><span>40</span>
          <span>50</span><span>60</span><span>70</span><span>80</span><span>90</span><span>100</span>
        </div>
      </div>
      <div class="sort-bar">
        <button class="sort-btn active" data-sort="score" id="sortScore">按分数排序</button>
        <button class="sort-btn" data-sort="time" id="sortTime">按时间排序</button>
        <button class="sort-btn" data-sort="avg" id="sortAvg">按主题均分排序</button>
      </div>
    </section>

    <!-- topic groups -->
    <section class="topics" id="topicList">
      <div class="topics-loading">加载中…</div>
    </section>
  </div>

  <!-- detail panel (side-by-side on desktop, overlay on mobile) -->
  <aside class="detail-panel" id="detailPanel">
    <div class="detail-panel-inner">
      <button class="detail-close" id="detailClose">✕</button>
      <div class="detail-body" id="detailBody"></div>
    </div>
  </aside>
</div>

<!-- data source selector -->
<div class="source-bar" id="sourceBar">
  <label class="source-label">数据源</label>
  <select id="sourceSelect">
    <option value="hours:1">近 1 小时</option>
    <option value="hours:3">近 3 小时</option>
    <option value="hours:12">近 12 小时</option>
    <option value="hours:24" selected>近 1 天</option>
    <option value="hours:72">近 3 天</option>
    <option value="hours:168">近 7 天</option>
  </select>
  <button class="source-btn" id="sourceLoad">加载</button>
  <input type="file" id="fileInput" accept=".json" style="display:none">
  <button class="source-btn" id="fileBtn">导入 JSON</button>
</div>

<script src="app.js"></script>
</body>
</html>
